# expanded-refseg — optflow re-render config.
#
# Re-renders the legacy reference-seg render000/001 with optflow geometry (obs depth,
# cam2world, class_to_l2w, reference depth/pose/K) so the reprojection-coverage proposer
# gate can run on them. Modeled on the proven render002/runtime.yaml (amazon-only). Drive
# each render dir with per-dir CLI overrides:
#   isaac-datagen configs/expanded-refseg.yaml idx=0 num_frames=100 num_targets=10   # 1000 obs
#   isaac-datagen configs/expanded-refseg.yaml idx=1 num_frames=25  num_targets=44   # 1100 obs
# (obs = num_frames * num_targets; values carried from each dir's old yaml to preserve size.)
# render002 is already complete optflow — do NOT re-render it; it only needs Stage B.

mode: optflow                      # MANDATORY (no default); baked so no CLI flag is needed
scene: empty
seed: 1                            # effective_seed = seed + idx -> distinct RNG per dir
idx: 0                             # overridden per dir
num_targets: 3                     # overridden per dir
num_frames: 100                    # overridden per dir
dataset_dir: /data/user/jeffk/datasets/expanded-refseg   # MUST pre-exist
intrinsics_path: zed_K.npy

descriptor_device: cuda:1          # GPU — Phase 1 precomputes the DIFT reference features
proposer_device: cpu               # baked so the dir's runtime.yaml already matches Stage B
                                   # (grid proposer is reference-free, no NN -> CPU)

dome_light: True
dry_run: False

# Placement / poses — render002's recipe (replaces the removed pallet OccupancyGrid placer).
placement: UntilExhaustedStacker
placement_args:
  column_height: 3
pose_generation_policy: LookAtPoser
pose_generation_policy_args:
  xrange: ${xrange}
  yrange: ${yrange}
  zrange: ${zrange}
xrange: [0.25, 0.85]
yrange: [-0.42, 0.42]
zrange: [-0.40, 0.40]

# amazon-only catalog (relative to src/isaac_datagen/). OptFlowObject catalog already exists.
objects_path:
  - ../../assets/optflow_objects/amazon/
obs_full_alpha: False
filter_specs:
  - name: ReplicateFilter
    args: {key: name, value: 'amazon_*', count: 5}
  - name: ShuffleFilter
    args:
      seed: ${idx}

# Lighting / exposure — render002 values.
distant_light: True
distant_intensity: 2000.0
distant_angle: 0.53
distant_light_offset: [1.0, -3.0, 3.0]
dome_fill_intensity: 200.0
set_exposure: True
exposure_time: 1.0
f_number: 5.0
film_iso: 100.0
rt_subframes: 20
warmup_frames: 32

# Proposer / gate — bake the NEW grid proposer + reproj-coverage gate into runtime.yaml so the
# baked snapshot is honest for Stage B (Stage B re-overrides these on the CLI regardless).
proposer_config_path: ../../../reference_matching/src/reference_matching/configs/grid_proposal.yaml
descriptor_config_path: ../../../reference_matching/src/reference_matching/configs/descriptor.yaml
proposer_min_visible_ratio: 0.30   # reproj-coverage gate threshold (fraction of ref texture visible)

# Phase-3 inliers: border margin (px) a proposal must keep inside its class union mask.
inlier_border_eps: 0.0             # amazon convention (render002 + mixed-persp amazon use 0.0)
