# jagged-expanded-refseg-v2 — expanded-refseg-v2 with jagged column heights + larger jitter.
#
# Delta over expanded-refseg-v2.yaml:
#   - placement_args.max_column_height (jagged: per-column random height in [1, max]) replaces
#     the old fixed column_height; placement_args.epsilon=0.01 (up from the 0.002 default) sets
#     BOTH the inter-object vertical gap and the (x, y) placement jitter sigma.
#   - ReplicateFilter count 5 -> 10 (denser clutter).
#   - writes to datasets/jagged-expanded-refseg-v2; baked num_frames=20 / num_targets=5 (100 obs).
# Drive per-dir (num_frames/num_targets overridable on the CLI):
#   isaac-datagen-pipeline configs/jagged-expanded-refseg-v2.yaml idx=0

mode: optflow                      # MANDATORY (no default); baked so no CLI flag is needed
scene: empty
seed: 1                            # effective_seed = seed + idx -> distinct RNG per dir
idx: 0                             # overridden per dir
num_targets: 5                     # camera targets (grasp points aimed at)
num_frames: 20                     # poses per target; obs = num_targets * num_frames = 100
dataset_dir: /data/user/jeffk/datasets/jagged-expanded-refseg-v2   # MUST pre-exist
intrinsics_path: zed_K.npy

descriptor_device: cuda:1          # GPU — Phase 1 precomputes the DIFT reference features
proposer_device: cpu               # baked so the dir's runtime.yaml already matches Stage B
                                   # (grid proposer is reference-free, no NN -> CPU)

dome_light: True
dry_run: False

# Placement / poses — UntilExhaustedStacker, now jagged column heights with y-depth jitter
# (min_y/max_y stagger columns front-to-back instead of a flat wall at y=0).
placement: UntilExhaustedStacker
placement_args:
  max_column_height: 3             # jagged: each column height drawn uniformly in [1, 3]
  epsilon: 0.01                    # inter-object gap + (x,y) jitter sigma (up from 0.002 default)
  min_y: 0.0
  max_y: 0.10                      # 10cm front-to-back (world-y depth) stagger (USD meters)
  min_gap: 0.0
  max_gap: 0.50                    # up to 50cm horizontal (x) gap jitter between columns
pose_generation_policy: LookAtPoser
pose_generation_policy_args:
  xrange: ${xrange}
  yrange: ${yrange}
  zrange: ${zrange}
xrange: [0.25, 0.85]
yrange: [-0.42, 0.42]
zrange: [-0.40, 0.40]

# Curated 8-instance amazon catalog (relative to src/isaac_datagen/). Pre-filtered, so no RegexFilter.
objects_path:
  - ../../assets/optflow_objects/amazon-v2/
obs_full_alpha: False
filter_specs:
  - name: ReplicateFilter
    args: {key: name, value: 'amazon_*', count: 10}
  - name: ShuffleFilter
    args:
      seed: ${idx}

# Lighting / exposure — render002 values.
distant_light: True
distant_intensity: 2000.0
distant_angle: 0.53
distant_light_offset: [1.0, -3.0, 3.0]
dome_fill_intensity: 200.0
set_exposure: True
exposure_time: 1.0
f_number: 5.0
film_iso: 100.0
rt_subframes: 20
warmup_frames: 32

# Proposer / gate — bake the grid proposer + reproj-coverage gate into runtime.yaml so the baked
# snapshot is honest for Stage B (Stage B re-overrides these on the CLI regardless).
proposer_config_path: ../../../reference_matching/src/reference_matching/configs/grid_proposal.yaml
descriptor_config_path: ../../../reference_matching/src/reference_matching/configs/descriptor.yaml
proposer_min_visible_ratio: 0.30   # reproj-coverage gate threshold (fraction of ref texture visible)

# Phase-3 inliers: border margin (px) a proposal must keep inside its class union mask.
inlier_border_eps: 0.0             # amazon convention (render002 + mixed-persp amazon use 0.0)
