# K-shot FINE-TUNE POOL for held-out class snack033 (Stage C ONLY — reuses the
# store001-optflow-objects-keep catalog; no re-extraction, no reference render). This is NOT
# set2 — set2 (snack031/033/034/035 together) is the frozen held-out VALIDATION set and must
# never be trained on. This render is the separate surround-shot capture session (roadmap I.4)
# that supplies K-shot training data: single class only, every instance of it kept active on
# the shelf (variant A — the sibling `-1inst` config isolates to exactly one physical instance).
# RemoveUntrackedProducts deactivates every OTHER product under the 7 product globs (cataloged or
# not); require_tracked_only fail-louds at scene build if any present-but-unlabeled product
# survives; shelf/environment assets under model_store001 stay (they match no product glob).
# Every instance of snack033 is a target ONCE (num_targets:null), 25 LookAtPoser views each
# (reduced from set1/set2's 40 — the K-shot ladder tops out at K=25, so 25 views/instance is
# already enough; the fine-tune step takes the ordinal first K of these per arm).
#   Stage C  isaac-datagen configs/store001-optflow-snacks-kshot-snack033.yaml idx=0
mode: optflow
scene: empty                    # consumed only by build_scene; build_store_scene ignores it
seed: 1
idx: 0
num_targets: null               # every instance of the kept class ONCE = "default instances per class"
num_frames: 25                  # 25 LookAtPoser views per instance — matches the K-shot ladder's max K
dataset_dir: datasets/store001-optflow-snacks-kshot-snack033   # MUST pre-exist
intrinsics_path: zed_K.npy

descriptor_device: cuda:0
proposer_device: cpu
dry_run: False
inlier_border_eps: 0.0

# ── Store scene (Stage C) ────────────────────────────────────────────────────
scene_builder: build_store_scene                # scene_builders registry key (explicit selector)
scene_builder_args:
  store_usd: ../../../usds/store001.usd
  product_patterns: ["model_snack*", "model_instant_beverages*", "model_flour*",
                     "model_detergent*", "model_sauces*", "model_cereal*", "model_drink101*"]
  #  ^ removal + gate scope — the verify config's FULL 7-glob product inventory (drink101 was
  #    missing here: in the store, never cataloged — without its glob it survives removal)
  grasp_frame_policy: FixedFaceGrasp            # UNUSED at Stage C — grasp_point is replayed from the
  grasp_frame_policy_args: {face: "-Y"}         #   baked catalog (add_catalog_grasp_frame); validator only
  mutations:
    - {name: RemoveUntrackedProducts}   # drop every product whose class != snack033 (the ONLY tracked id)
  require_tracked_only: ["model_snack*", "model_instant_beverages*", "model_flour*",
                         "model_detergent*", "model_sauces*", "model_cereal*", "model_drink101*"]
  #  ^ build-time leak gate: after mutations, every active product here must be a labeled target

# ── Lighting: the store's own lights, jittered by pattern ────────────────────
dome_light: False                               # no synthetic dome/key over the store lighting
distant_light: False
light_jitter_patterns:
  - {root: "/World/Store", pattern: "*Light*", intensity_scale_range: [0.25, 8.0]}

# ── Poses: LookAtPoser halo box (validated store training ranges) ─────────────
pose_generation_policy: LookAtPoser
pose_generation_policy_args:
  xrange: ${xrange}
  yrange: ${yrange}
  zrange: ${zrange}
xrange: [0.3, 0.9]
yrange: [-0.3, 0.3]
zrange: [-0.2, 0.3]

# ── Catalog (Stage-B output) + per-run SKU subset (target = ONE class only) ──
objects_path:
  - datasets/store001-optflow-objects-keep
filter_specs:
  - name: RegexFilter                           # inclusion filter on meta["class"] (re.search)
    args: {key: class, value: '^(snack033)$'}   # anchored: exactly this one class — the isolation change

placement: UntilExhaustedStacker                # required by RuntimeConfig; unused in store mode
placement_args: {}
proposer_config_path: ../../../reference_matching/src/reference_matching/configs/grid_proposal.yaml
descriptor_config_path: ../../../reference_matching/src/reference_matching/configs/descriptor.yaml
set_exposure: True
exposure_time: 1.0
f_number: 5.0
film_iso: 100.0
rt_subframes: 20
warmup_frames: 32
