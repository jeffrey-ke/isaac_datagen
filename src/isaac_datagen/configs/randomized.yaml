idx: 0
num_targets: 5
scene: empty
dataset_dir: datasets/mixed-persp
intrinsics_path: zed_K.npy
placement: until_exhausted_stacker
pallet_dims: [11,1,4]
num_frames: 25
descriptor_device: cuda:1
proposer_device: cuda:0
dome_light: True

dry_run: False

# Lighting: aimed DistantLight key + DomeLight fill (see RuntimeConfig). The key is
# aimed at the grasp-target centroid; distant_light_offset is the sun direction
# (front-top into the -Y faces). TUNE distant_intensity on the first render.
distant_light: True
distant_intensity: 2000.0
distant_angle: 0.53
distant_light_offset: [1.0, -3.0, 3.0]
dome_fill_intensity: 200.0

# Phase-3 inliers: border margin (px) a proposal must keep inside its class union mask.
inlier_border_eps: 2.0

# Camera pose-sampling box in the TARGET frame (the "halo" around each grasp point).
# Currently near-degenerate: x and z are fixed, only y varies (-0.22..0) -> poses fan
# along one axis on one side instead of orbiting. Widen these for a fuller halo.
xrange: [0.45, 0.85]
yrange: [-0.42, 0.42]
zrange: [-0.40, 0.40]

# Pose-generation policy (posers.py registry). Ranges interpolate the halo box above.
pose_generation_policy: LookAtPoser
pose_generation_policy_args:
  xrange: ${xrange}
  yrange: ${yrange}
  zrange: ${zrange}

# Invisible shadow-casting occluders, per grasp target (0 = off). Placed once via
# this poser, sampled in the TARGET frame then mapped to world by target2world.
# E4 (penetrate-vs-float test): one fixed-offset Cube per target. +x is toward the
# camera and the box sits at x<=0, so offset=[0,0,0] straddles the box (penetrate)
# and offset=[0.2,0,0] floats in front (override on the float run). occluder_scale
# fixes the cube at ~half the old random size for a clean, reproducible placement.
occluders_per_target: 0
occluder_pose_policy: GridFixedPoser
occluder_pose_policy_args:
  xrange: [0.85, 0.95]
  yrange: [-0.42, 0.42]
  zrange: [-0.40, 0.40]
  target_to_ego_ypr: [0,0,0]
occluder_scale: 0.06

proposer_config_path: /home/jeffk/repo/reference_matching/src/reference_matching/configs/gim_dkm_proposal.yaml
descriptor_config_path: /home/jeffk/repo/reference_matching/src/reference_matching/configs/descriptor.yaml

graspable_objects_path: 
  - /home/jeffk/repo/visual_servoing/datagen2_isaacsim/object_dataset_amazon
  - /home/jeffk/repo/visual_servoing/datagen2_isaacsim/kleenex_dataset
  - /home/jeffk/repo/isaac_datagen/datasets/ycb_dataset

obs_full_alpha: True
filter_specs:
  - name: ShuffleFilter
    args: 
      seed: ${idx}
  - name: MetaFilter
    args: {key: name, value: 'amazon_*', max: 5}
