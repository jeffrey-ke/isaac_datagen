# store001 snacks REHEARSAL FINE-TUNE dataset: set1's 4 train classes + held-out snack034 tracked
# together (Stage C ONLY — reuses the store001-optflow-objects-keep catalog; no re-extraction, no
# reference render). This is NOT set2 — set2 is the frozen held-out VALIDATION benchmark and must
# never appear in a fine-tune's data.paths. The five classes are the ONLY targets AND the only
# products left active on the shelves: RemoveUntrackedProducts deactivates every other product under
# the 7 product globs, and require_tracked_only fail-louds at scene build if any present-but-
# unlabeled product survives. Every facing of each class is a target ONCE (num_targets:null), each
# rendered from 40 LookAtPoser views → (25+8)×40 = 1320 frames.
#   Stage C  isaac-datagen configs/store001-optflow-snacks-set1-plus-snack034.yaml idx=0
mode: optflow
scene: empty                    # consumed only by build_scene; build_store_scene ignores it
seed: 2001                      # 2001-series = set1+X rehearsal family; NOT 1 (set1/set2's seed) —
                                #   no shared pose stream with the frozen set2 benchmark
idx: 0
num_targets: null               # every facing of each kept class ONCE = "default instances per class"
num_frames: 40                  # 40 LookAtPoser views per facing → 33 facings × 40 = 1320 frames
dataset_dir: datasets/store001-optflow-snacks-set1-plus-snack034   # MUST pre-exist
intrinsics_path: zed_K.npy

descriptor_device: cuda:0
proposer_device: cpu
dry_run: False
inlier_border_eps: 0.0

# ── Store scene (Stage C) ────────────────────────────────────────────────────
scene_builder: build_store_scene                # scene_builders registry key (explicit selector)
scene_builder_args:
  store_usd: ../../../usds/store001.usd
  product_patterns: ["model_snack*", "model_instant_beverages*", "model_flour*",
                     "model_detergent*", "model_sauces*", "model_cereal*", "model_drink101*"]
  #  ^ removal + gate scope — the verify config's FULL 7-glob product inventory (drink101 was
  #    missing here: in the store, never cataloged — without its glob it survives removal)
  grasp_frame_policy: FixedFaceGrasp            # UNUSED at Stage C — grasp_point is replayed from the
  grasp_frame_policy_args: {face: "-Y"}         #   baked catalog (add_catalog_grasp_frame); validator only
  mutations:
    - {name: RemoveUntrackedProducts}   # drop every product whose class ∉ the filter_specs ids
  require_tracked_only: ["model_snack*", "model_instant_beverages*", "model_flour*",
                         "model_detergent*", "model_sauces*", "model_cereal*", "model_drink101*"]
  #  ^ build-time leak gate: after mutations, every active product here must be a labeled target

# ── Lighting: the store's own lights, jittered by pattern ────────────────────
dome_light: False                               # no synthetic dome/key over the store lighting
distant_light: False
light_jitter_patterns:
  - {root: "/World/Store", pattern: "*Light*", intensity_scale_range: [0.25, 8.0]}

# ── Poses: LookAtPoser halo box (validated store training ranges) ─────────────
pose_generation_policy: LookAtPoser
pose_generation_policy_args:
  xrange: ${xrange}
  yrange: ${yrange}
  zrange: ${zrange}
xrange: [0.3, 0.9]
yrange: [-0.3, 0.3]
zrange: [-0.2, 0.3]

# ── Catalog (Stage-B output) + per-run SKU subset (targets = set1 + snack034) ─
objects_path:
  - ../../assets/optflow_objects/store001-optflow-objects-keep   # catalog moved 2026-07-10; set1's
    # own `datasets/...` value is stale — do not copy it
filter_specs:
  - name: RegexFilter                           # inclusion filter on meta["class"] (re.search)
    args: {key: class, value: '^(snack017|snack020|snack023|snack027|snack034)$'}   # anchored:
    # set1's exact 4 classes + the one held-out class; RemoveUntrackedProducts derives its
    # keep-set from this — single source of truth

placement: UntilExhaustedStacker                # required by RuntimeConfig; unused in store mode
placement_args: {}
proposer_config_path: ../../../reference_matching/src/reference_matching/configs/grid_proposal.yaml
descriptor_config_path: ../../../reference_matching/src/reference_matching/configs/descriptor.yaml
set_exposure: True
exposure_time: 1.0
f_number: 5.0
film_iso: 100.0
rt_subframes: 20
warmup_frames: 32
